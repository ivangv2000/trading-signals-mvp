<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>V14 Trading Signals</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #0b1220;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #0b1220;
      z-index: 10;
      padding: 1rem;
      text-align: center;
    }

    #loader.is-hidden {
      display: none;
    }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #1f2937;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-state p,
    #timeout-panel p {
      font-size: 0.95rem;
      color: #94a3b8;
      letter-spacing: 0.02em;
      max-width: 28rem;
      line-height: 1.5;
    }

    .loading-state h1,
    #timeout-panel h2 {
      font-size: clamp(1.1rem, 4vw, 1.35rem);
      font-weight: 800;
      color: #f9fafb;
    }

    #timeout-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      z-index: 11;
    }

    #timeout-panel.is-visible {
      display: flex;
    }

    .diagnostic {
      font-size: 0.85rem !important;
      color: #64748b !important;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 0.25rem;
    }

    .btn {
      appearance: none;
      border: 1px solid #334155;
      background: #1e293b;
      color: #f9fafb;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #334155;
    }

    .btn-primary {
      background: #2563eb;
      border-color: #2563eb;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      border: 0;
      display: block;
      background: #0b1220;
      z-index: 1;
    }

    #app-frame.is-ready {
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loading-state" id="loading-state">
      <h1>V14 Trading Signals</h1>
      <div class="spinner" role="status" aria-label="Cargando"></div>
      <p>Cargando V14 Trading Signals…</p>
    </div>

    <div id="timeout-panel" aria-live="assertive">
      <h2>V14 Trading Signals</h2>
      <p>La aplicación está tardando más de lo habitual.</p>
      <p class="diagnostic">Comprueba que la aplicación Streamlit sea pública y esté despierta.</p>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="retry-btn">Reintentar</button>
        <a
          class="btn"
          id="open-direct-btn"
          href="https://v14-trading-signals.streamlit.app"
          target="_blank"
          rel="noopener noreferrer"
        >Abrir Streamlit directamente</a>
      </div>
    </div>
  </div>

  <iframe
    id="app-frame"
    title="V14 Trading Signals"
    src="https://v14-trading-signals.streamlit.app/?embed=true"
    allow="clipboard-read; clipboard-write"
    loading="eager"
    onload="handleIframeLoad()"
  ></iframe>

  <script>
    var STREAMLIT_BASE_URL = "https://v14-trading-signals.streamlit.app";
    var STREAMLIT_EMBED_URL = STREAMLIT_BASE_URL + "/?embed=true";

    var frame = document.getElementById("app-frame");
    var loader = document.getElementById("loader");
    var loadingState = document.getElementById("loading-state");
    var timeoutPanel = document.getElementById("timeout-panel");
    var retryBtn = document.getElementById("retry-btn");
    var openDirectBtn = document.getElementById("open-direct-btn");
    var iframeLoaded = false;
    var timeoutShown = false;
    var timeoutTimer = null;

    openDirectBtn.href = STREAMLIT_BASE_URL;

    function showTimeoutPanel() {
      if (iframeLoaded) {
        return;
      }
      timeoutShown = true;
      loadingState.style.display = "none";
      timeoutPanel.classList.add("is-visible");
    }

    function hideLoader() {
      loader.classList.add("is-hidden");
      frame.classList.add("is-ready");
    }

    function handleIframeLoad() {
      iframeLoaded = true;
      if (timeoutTimer) {
        clearTimeout(timeoutTimer);
      }
      hideLoader();
    }

    function reloadIframe() {
      iframeLoaded = false;
      timeoutShown = false;
      loadingState.style.display = "flex";
      timeoutPanel.classList.remove("is-visible");
      loader.classList.remove("is-hidden");
      frame.classList.remove("is-ready");
      frame.src = STREAMLIT_EMBED_URL + "&_retry=" + Date.now();
      startTimeoutWatch();
    }

    function startTimeoutWatch() {
      if (timeoutTimer) {
        clearTimeout(timeoutTimer);
      }
      timeoutTimer = setTimeout(showTimeoutPanel, 20000);
    }

    retryBtn.addEventListener("click", reloadIframe);
    startTimeoutWatch();
  </script>
</body>
</html>
