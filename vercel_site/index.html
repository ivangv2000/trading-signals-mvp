<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>V14 Trading Signals</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1220;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #0b1220;
      z-index: 10;
      transition: opacity 0.35s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #1f2937;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loader p {
      font-size: 0.95rem;
      color: #94a3b8;
      letter-spacing: 0.02em;
    }

    #loader h1 {
      font-size: 1.25rem;
      font-weight: 800;
      color: #f9fafb;
    }

    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #0b1220;
    }
  </style>
</head>
<body>
  <div id="loader" aria-live="polite">
    <h1>V14 Trading Signals</h1>
    <div class="spinner" role="status" aria-label="Cargando"></div>
    <p>Cargando señales V14…</p>
  </div>

  <iframe
    id="app-frame"
    title="V14 Trading Signals"
    src="STREAMLIT_APP_URL/?embed=true"
    allow="clipboard-read; clipboard-write"
    loading="eager"
  ></iframe>

  <script>
    (function () {
      var frame = document.getElementById("app-frame");
      var loader = document.getElementById("loader");

      function hideLoader() {
        loader.classList.add("hidden");
        setTimeout(function () {
          loader.style.display = "none";
        }, 400);
      }

      frame.addEventListener("load", hideLoader);
      setTimeout(hideLoader, 12000);
    })();
  </script>
</body>
</html>
